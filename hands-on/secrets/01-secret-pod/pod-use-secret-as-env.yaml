apiVersion: v1
kind: Pod
metadata:
  name: pod-use-secret-as-env
spec:
  containers:
  - name: secret-env-pod
    image: nginx:alpine
    env:
    - name: DB_USER
      valueFrom:
        secretKeyRef:
          name: my-secret
          key: DB_USER
    - name: DB_PASSWORD
      valueFrom:
        secretKeyRef:
          name: my-secret
          key: DB_PASSWORD

apiVersion: v1
kind: Pod
metadata:
  name: nodejs-app
  labels:
    app: nodejs-app
spec:
  containers:
  - name: app
    image: nginx:alpine
    command: ["sh", "-c"]
    args:
      - |
        echo "Starting app on port $PORT"
        echo "DB Host: $DB_HOST"
        echo "Log Level: $LOG_LEVEL"
        sleep 3600
    envFrom:
    - configMapRef:
        name: app-config

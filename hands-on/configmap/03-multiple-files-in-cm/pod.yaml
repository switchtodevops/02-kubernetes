apiVersion: v1
kind: Pod
metadata:
  name: nginx-custom-8080
spec:
  containers:
  - name: nginx
    image: nginx:alpine
    ports:
    - containerPort: 8080
    volumeMounts:
    - name: nginx-conf
      mountPath: /etc/nginx/conf.d/default.conf
      subPath: nginx.conf
      
    - name: html-volume
      mountPath: /usr/share/nginx/html/index.html
      subPath: index.html

  volumes:
  - name: nginx-conf
    configMap:
      name: app-files
      items:
      - key: nginx.conf
        path: nginx.conf

  - name: html-volume
    configMap:
      name: app-files
      items:
      - key: index.html
        path: index.html


# One-line memory trick

# 👉 subPath = which file to take
# 👉 mountPath = where (and as what name) to place it
# 👉 key = file in ConfigMap, 
# 👉 path = file name inside the container (you can rename it)